name: CI (PR)

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]

concurrency:
  # github.ref is per-PR for pull_request events but collapses to refs/heads/main
  # for pull_request_target — keying on the PR number keeps both unique per PR.
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      environment: gpu-ci
