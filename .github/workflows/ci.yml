name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check quack/ tests/
      - name: Ruff format
        run: ruff format --check quack/ tests/

  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        gpu: [h100, b300]
    runs-on: [self-hosted, '${{ matrix.gpu }}']
    name: test (${{ matrix.gpu }})
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run tests
        run: |
          apptainer exec --nv --writable-tmpfs ~/attention_26.03.07.sif bash -c "
            export PYTHONPATH=\$PWD:\$PYTHONPATH &&
            export QUACK_CACHE_DIR=\$HOME/.quack_cache &&
            pytest tests/ --compile-only -n 16 &&
            pytest tests/ -n 8
          "
        timeout-minutes: 20
