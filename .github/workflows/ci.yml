name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APPTAINER_IMAGE: ~/attention_26.03.07.sif
  APPTAINER_FLAGS: --nv --writable-tmpfs
  QUACK_CACHE_DIR: $HOME/.quack_cache

jobs:
  lint:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    steps:
      - name: Debug environment
        run: |
          hostname
          whoami
          echo "PATH=$PATH"
          ls -la /usr/bin/apptainer 2>/dev/null || echo "not at /usr/bin/apptainer"
          which apptainer 2>/dev/null || echo "apptainer not on PATH"
          find /usr -name apptainer -type f 2>/dev/null || true
          find /opt -name apptainer -type f 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Ruff check
        run: /usr/bin/apptainer exec $APPTAINER_FLAGS $APPTAINER_IMAGE ruff check quack/ tests/
      - name: Ruff format
        run: /usr/bin/apptainer exec $APPTAINER_FLAGS $APPTAINER_IMAGE ruff format --check quack/ tests/

  test:
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install package and run tests
        run: |
          /usr/bin/apptainer exec $APPTAINER_FLAGS $APPTAINER_IMAGE bash -c '
            pip install -e ".[dev]" &&
            pytest tests/ --compile-only -n 16 --timeout=600 &&
            pytest tests/ -n 8 --timeout=600
          '
        timeout-minutes: 15
