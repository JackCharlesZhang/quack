name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check quack/ tests/
      - name: Ruff format
        run: ruff format --check quack/ tests/

  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda: [cu12, cu13]
        include:
          - cuda: cu12
            pip_extra: ""
          - cuda: cu13
            pip_extra: nvidia-cutlass-dsl[cu13]
    name: compile (${{ matrix.cuda }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install nvidia-cutlass-dsl apache-tvm-ffi torch-c-dlpack-ext pytest pytest-xdist ${{ matrix.pip_extra }}
      - name: Compile kernels
        run: PYTHONPATH=$PWD:$PYTHONPATH pytest tests/ --compile-only -n 4
        timeout-minutes: 15

  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        gpu: [h100, b300]
    runs-on: [self-hosted, '${{ matrix.gpu }}']
    name: test (${{ matrix.gpu }})
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run tests
        run: |
          apptainer exec --nv --writable-tmpfs ~/attention_26.03.07.sif bash -c "
            export PYTHONPATH=\$PWD:\$PYTHONPATH &&
            export QUACK_CACHE_DIR=\$HOME/.quack_cache &&
            pytest tests/ --compile-only -n 16 &&
            FREE_GPUS=\$(nvidia-smi --query-gpu=index,memory.free --format=csv,noheader,nounits | awk -F', ' '\$2 >= 40000 {print \$1}' | paste -sd,) &&
            if [ -z \"\$FREE_GPUS\" ]; then echo 'No GPUs with >= 40GB free memory'; exit 1; fi &&
            echo \"Running tests on GPUs: \$FREE_GPUS\" &&
            NUM_GPUS=\$(echo \"\$FREE_GPUS\" | tr ',' '\n' | wc -l) &&
            CUDA_VISIBLE_DEVICES=\$FREE_GPUS pytest tests/ -n \$NUM_GPUS
          "
        timeout-minutes: 30
