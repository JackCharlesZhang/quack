name: CI

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check quack/ tests/
      - name: Ruff format
        run: ruff format --check quack/ tests/

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - gpu: h100
          - gpu: b300
          - gpu: h100
            arch: '120'
    runs-on: [self-hosted, '${{ matrix.gpu }}']
    name: test (${{ matrix.gpu }}${{ matrix.arch && format(' / sm{0}', matrix.arch) || '' }})
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/gpu-test
        with:
          arch: ${{ matrix.arch }}
